---
name: builder
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "holster"
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: klowdo
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build all packages
        run: nix build .#ciChecks.x86_64-linux.packages --no-link -L

  nixos:
    name: NixOS ${{ matrix.host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [dellicious, virt-nix]
    steps:
      - uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "cleave"
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: klowdo
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build NixOS ${{ matrix.host }}
        run: nix build ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" --no-link -L

  homes:
    name: Home ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: ["klowdo@dellicious", "klowdo@virt-nix"]
    steps:
      - uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "holster"
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: klowdo
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build Home ${{ matrix.profile }}
        run: nix build ".#homeConfigurations.\"${{ matrix.profile }}\".activationPackage" --no-link -L
