name: nix-update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        run: |
          packages=$(grep -rh '# nix-update:' --include='*.nix' . \
            | sed 's/.*# nix-update: *//' \
            | sort -u \
            | jq -R -s -c '
              split("\n")
              | map(select(length > 0))
              | map(split(" ") | {name: .[0], args: (.[1:] | join(" "))})
            ')
          echo "matrix={\"package\":$packages}" >> "$GITHUB_OUTPUT"

  update:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run nix-update
        id: nix-update
        run: |
          set +e
          output=$(nix-shell -p nix-update --run \
            "nix-update --flake ${{ matrix.package.name }} ${{ matrix.package.args }}" 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            echo "nix-update exited with code $exit_code"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.nix-update.outputs.updated == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "chore(nix-update): bump ${{ matrix.package.name }}"
          branch: nix-update/${{ matrix.package.name }}
          title: "chore(nix-update): bump ${{ matrix.package.name }}"
          body: |
            Automated version bump for `${{ matrix.package.name }}` via `nix-update`.
          labels: nix-update

      - name: Enable auto-merge
        if: steps.nix-update.outputs.updated == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --rebase
