# vim: ft=hyprlang
monitorv2 {
  output = desc:Dell Inc. DELL U2724D BW25834
  mode = 2560x1440@120
  position = 0x0
  scale = 1.0
}
{{if isLidClosed}}
monitorv2 {
  output = desc:Samsung Display Corp. 0x414D
  disabled = true
}
{{else}}
monitorv2 {
  output = desc:Samsung Display Corp. 0x414D
  mode = 3456x2160@60
  position = 0x1440
  scale = 1.5
}
{{end}}

# Lid close: lock (template disables laptop display)
#bindl = ,switch:on:Lid Switch, exec, lock-screen
# Lid open: template re-enables laptop display automatically
